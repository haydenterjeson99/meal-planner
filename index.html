<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <style>
        /* (Keep your existing CSS here) */
    </style>
</head>
<body>
    <div id="sync-status"></div>
    <script>
        const BIN_ID = "6a34ae6bf5f4af5e290c7fbb"; 
        const MASTER_KEY = "$2a$10$f2TkUBvxPmf1nty6gYbGy.ww8tUG5Ox/YS8rvFI5bW6pqjuBdj4gW"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // SAFETY SHIELD: Initialize with defaults immediately
        let cloudData = { 
            customMeals: [
                { name: "Utility Bowl", servings: 6, ingredients: [{item: "Rice", qty: 0.84, unit: "cups", protein: 4.2}] },
                { name: "Mexican Bowl", servings: 6, ingredients: [{item: "Chicken", qty: 3, unit: "lbs", protein: 69.5}] }
            ], 
            plannedMeals: {} 
        };

        async function fetchFromCloud() {
            try {
                const response = await fetch(API_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
                const result = await response.json();
                
                // If cloud data exists and is valid, use it
                if (result.record && result.record.customMeals) {
                    cloudData = result.record;
                } else {
                    // Otherwise, force save the defaults
                    saveToCloud();
                }
                renderAll();
                showSync("☁️ Cloud Synced");
            } catch (error) {
                renderAll(); // Fallback to local default state
                showSync("⚠️ Offline Mode", true);
            }
        }

        async function saveToCloud() {
            try {
                // Ensure data structure exists before saving
                if(!cloudData.customMeals) cloudData.customMeals = [];
                if(!cloudData.plannedMeals) cloudData.plannedMeals = {};
                
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(cloudData)
                });
            } catch (error) {
                console.error("Save error:", error);
            }
        }

        // ... (The rest of your logic stays exactly the same)
        fetchFromCloud();
    </script>
</body>
</html>
