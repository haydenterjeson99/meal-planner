<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planning Dashboard 2.0</title>
    <style>
        /* Theme */
        :root {
            --bg-color: #FAF9F6;
            --text-color: #1F1F1E;
            --border-color: #D3CFC2;
            --accent-bg: #EAE8DF;
            --btn-bg: #1F1F1E;
            --btn-text: #FAF9F6;
            --danger-bg: #ffeaea;
            --danger-text: #cc0000;
            --suggestion-bg: #f0f7f4;
            --suggestion-border: #9ac2af;
            --font-serif: 'Georgia', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1rem;
            text-align: center;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 0;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: 1 / -1;
            }
        }

        .section {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 4px;
        }

        .section-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Forms & Inputs */
        select, input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            box-sizing: border-box;
        }

        button {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: opacity 0.2s;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
        }

        button:hover {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: var(--accent-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        
        .btn-danger {
            background-color: var(--danger-bg);
            color: var(--danger-text);
            border: 1px solid #ffcccc;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        /* Lists */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--accent-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li:last-child {
            border-bottom: none;
        }

        .suggestion-box {
            background-color: var(--suggestion-bg);
            border: 1px solid var(--suggestion-border);
            border-radius: 4px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .suggestion-item {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px dashed var(--suggestion-border);
        }
        .suggestion-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        /* Specific Layouts */
        .day-row {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .day-label {
            flex: 0 0 100px;
            font-weight: 600;
        }
        
        .day-row select {
            flex: 1;
            margin-bottom: 0;
        }

        .meal-card {
            border: 1px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ingredient-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 0.5rem;
            align-items: start;
            margin-bottom: 0.5rem;
        }
        
        .form-top-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-top-row input {
            margin-bottom: 0;
        }

        .muted {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meal Planner 2.0</h1>
    </header>

    <div class="container">
        
        <div class="section">
            <h2 class="section-header">Weekly Calendar</h2>
            <div id="calendar"></div>
        </div>

        <div class="section">
            <h2 class="section-header">Master Shopping List</h2>
            <ul id="shopping-list"></ul>
            <div id="total-cost-box" style="margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border-color); font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between;">
                <span>Estimated Total:</span>
                <span id="grand-total">$0.00</span>
            </div>
            
            <div class="suggestion-box" id="smart-suggestions-box" style="display: none;">
                <h4 style="margin: 0 0 0.5rem 0; font-family: var(--font-serif); font-size: 1.1rem;">Smart Dynamic Savings</h4>
                <div id="suggestions-content"></div>
            </div>
        </div>

        <div class="section full-width">
            <h2 class="section-header">Meal Library & Nutrition Facts</h2>
            <div id="meal-library" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;"></div>
        </div>

        <div class="section full-width">
            <h2 class="section-header" id="form-title">Create Custom Meal</h2>
            <form id="create-meal-form">
                <div class="form-top-row">
                    <input type="text" id="new-meal-name" placeholder="Meal Name (e.g., Avocado Toast)" style="flex: 2;" required>
                    <input type="number" id="new-meal-servings" placeholder="Servings Produced (e.g., 2)" min="1" style="flex: 1;" required>
                </div>
                
                <h4 style="margin-bottom: 0.5rem; margin-top: 1rem;">Ingredients <span class="muted" style="font-weight: normal;">(Protein auto-calculates for known items)</span></h4>
                <div id="ingredient-inputs">
                    <div class="ingredient-row">
                        <input type="text" class="ing-name" placeholder="Ingredient (e.g., Chicken)" required>
                        <input type="number" step="0.1" class="ing-qty" placeholder="Qty" required>
                        <input type="text" class="ing-unit" placeholder="Unit (e.g., lbs, cups)" required>
                        <input type="number" step="0.1" class="ing-protein" placeholder="Protein (g)" required>
                    </div>
                </div>
                
                <button type="button" class="btn-secondary" id="add-ingredient-btn" style="margin-bottom: 1rem;">+ Add Another Ingredient</button>
                <div class="btn-group">
                    <button type="submit" id="submit-meal-btn">Save Meal</button>
                    <button type="button" class="btn-secondary" id="cancel-edit-btn" style="display: none;" onclick="cancelEdit()">Cancel Edit</button>
                </div>
            </form>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const JSONBIN_BIN_ID = ''; 
        const JSONBIN_MASTER_KEY = ''; 
        
        // ==========================================
        // TRADER JOE'S PACKAGING & PRICING DATABASE
        // ==========================================
        const traderJoesDB = {
            "rice": { baseUnit: "oz", pkgSize: 32, price: 2.99, label: "TJ's Jasmine Rice (2 lbs)" },
            "sweet potato": { baseUnit: "oz", pkgSize: 48, price: 4.49, label: "TJ's Sweet Potatoes (3 lb bag)" },
            "broccoli": { baseUnit: "oz", pkgSize: 12, price: 2.79, label: "TJ's Broccoli Florets (12 oz Bag)" },
            "ground turkey": { baseUnit: "oz", pkgSize: 16, price: 4.99, label: "TJ's Ground Turkey (1 lb)" },
            "chicken": { baseUnit: "oz", pkgSize: 16, price: 3.99, label: "TJ's Chicken Breasts (1 lb)" },
            "cheese": { baseUnit: "oz", pkgSize: 8, price: 2.99, label: "TJ's Shredded Cheddar (8 oz)" },
            "black beans": { baseUnit: "oz", pkgSize: 15, price: 0.99, label: "TJ's Black Beans (15 oz Can)" },
            "peppers": { baseUnit: "whole", pkgSize: 3, price: 3.29, label: "TJ's Bell Peppers (3 Pack)" },
            "onion": { baseUnit: "whole", pkgSize: 6, price: 2.49, label: "TJ's Yellow Onions (Bag of 6)" },
            "garlic": { baseUnit: "whole", pkgSize: 3, price: 1.49, label: "TJ's Garlic (3 Head Sleeve)" },
            "salsa": { baseUnit: "oz", pkgSize: 12, price: 2.29, label: "TJ's Fresh Salsa (12 oz)" },
            "spinach": { baseUnit: "oz", pkgSize: 6, price: 2.49, label: "TJ's Organic Baby Spinach (6 oz Bag)" },
            "canned corn": { baseUnit: "oz", pkgSize: 15, price: 0.99, label: "TJ's Sweet Corn (15 oz Can)" },
            "couscous": { baseUnit: "oz", pkgSize: 16, price: 2.49, label: "TJ's Traditional Couscous (16 oz)" },
            "feta": { baseUnit: "oz", pkgSize: 8, price: 3.99, label: "TJ's Block Feta Cheese (8 oz)" },
            "dill": { baseUnit: "whole", pkgSize: 1, price: 1.79, label: "TJ's Fresh Dill (1 Bunch)" },
            "chick peas": { baseUnit: "oz", pkgSize: 15, price: 0.99, label: "TJ's Garbanzo Beans (15 oz Can)" }
        };

        const nutritionDB = [
            { keywords: ["chicken", "poultry"], proteinPerOz: 8.8 },
            { keywords: ["turkey"], proteinPerOz: 8.0 },
            { keywords: ["beef", "steak", "hamburger"], proteinPerOz: 7.4 },
            { keywords: ["pork", "bacon", "ham"], proteinPerOz: 7.0 },
            { keywords: ["salmon", "tuna", "fish"], proteinPerOz: 7.1 },
            { keywords: ["egg"], proteinPerOz: 6.0 },
            { keywords: ["rice"], proteinPerOz: 0.8 }, 
            { keywords: ["black bean", "kidney bean", "beans"], proteinPerOz: 2.5 },
            { keywords: ["broccoli", "spinach", "kale"], proteinPerOz: 0.8 },
            { keywords: ["potato", "yam", "sweet potato"], proteinPerOz: 0.5 },
            { keywords: ["cheese", "cheddar", "mozzarella"], proteinPerOz: 6.5 },
            { keywords: ["milk", "yogurt"], proteinPerOz: 1.0 },
            { keywords: ["tofu", "tempeh"], proteinPerOz: 4.5 },
            { keywords: ["corn", "canned corn"], proteinPerOz: 0.9 },
            { keywords: ["couscous"], proteinPerOz: 1.0 },
            { keywords: ["chick pea", "chickpea", "garbanzo"], proteinPerOz: 2.5 }
        ];

        const unitMultipliers = {
            "lb": 16, "lbs": 16, "pound": 16, "pounds": 16,
            "oz": 1, "ounce": 1, "g": 0.035274, "gram": 0.035274, "grams": 0.035274,
            "cup": 8, "cups": 8, "can": 15, "cans": 15, "whole": 1, "cloves": 0.2, "tbsp": 0.5
        };

        const defaultMeals = [
            {
                name: "Utility Bowl",
                servings: 1,
                ingredients: [
                    { item: "Rice", qty: 1, unit: "cup", protein: 6.4 },
                    { item: "Sweet Potato", qty: 3.0, unit: "oz", protein: 1.5 },
                    { item: "Broccoli", qty: 3.0, unit: "oz", protein: 2.4 },
                    { item: "Ground Turkey", qty: 1, unit: "lb", protein: 128.0 },
                    { item: "Onion", qty: 1, unit: "whole", protein: 0 },
                    { item: "Garlic", qty: 2, unit: "cloves", protein: 0 }
                ]
            },
            {
                name: "Mexican Bowl",
                servings: 2,
                ingredients: [
                    { item: "Chicken", qty: 1, unit: "lb", protein: 140.8 },
                    { item: "Cheese", qty: 0.5, unit: "cups", protein: 26.0 },
                    { item: "Black Beans", qty: 1, unit: "can", protein: 37.5 },
                    { item: "Peppers", qty: 2, unit: "whole", protein: 0 },
                    { item: "Onion", qty: 1, unit: "whole", protein: 0 },
                    { item: "Garlic", qty: 2, unit: "cloves", protein: 0 },
                    { item: "Salsa", qty: 0.5, unit: "cups", protein: 0 },
                    { item: "Spinach", qty: 2, unit: "cups", protein: 12.8 },
                    { item: "Rice", qty: 1, unit: "cup", protein: 6.4 },
                    { item: "Canned Corn", qty: 1, unit: "can", protein: 13.5 }
                ]
            },
            {
                name: "Greek Bowl",
                servings: 1,
                ingredients: [
                    { item: "CousCous", qty: 1, unit: "cup", protein: 8.0 },
                    { item: "Chicken", qty: 0.5, unit: "lbs", protein: 70.4 },
                    { item: "Broccoli", qty: 1, unit: "cup", protein: 6.4 },
                    { item: "Feta", qty: 0.25, unit: "cups", protein: 13.0 },
                    { item: "Dill", qty: 1, unit: "tbsp", protein: 0 },
                    { item: "Chick Peas", qty: 0.5, unit: "can", protein: 18.8 }
                ]
            }
        ];

        let meals = [...defaultMeals];
        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        let plannedMeals = {};
        let isEditing = false;
        let editingMealName = null;

        async function init() {
            await loadData();
            renderCalendar();
            renderMealLibrary();
            updateShoppingList();
        }

        async function saveData() {
            const dataToSave = { meals: meals, plannedMeals: plannedMeals };
            localStorage.setItem('mealPlannerData', JSON.stringify(dataToSave));
            if (JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
                        body: JSON.stringify(dataToSave)
                    });
                } catch (error) {
                    console.warn("Sync error", error);
                }
            }
        }

        async function loadData() {
            let data = null;
            if (JSONBIN_BIN_ID && JSONBIN_MASTER_KEY) {
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
                    });
                    if (response.ok) {
                        const json = await response.json();
                        data = json.record;
                    }
                } catch (error) {
                    console.warn("Load error", error);
                }
            }
            if (!data) {
                const localData = localStorage.getItem('mealPlannerData');
                if (localData) data = JSON.parse(localData);
            }
            if (data) {
                if (data.meals && data.meals.length > 0) meals = data.meals;
                if (data.plannedMeals) plannedMeals = data.plannedMeals;
            }
        }

        function renderCalendar() {
            const calendarDiv = document.getElementById('calendar');
            calendarDiv.innerHTML = '';
            days.forEach(day => {
                const row = document.createElement('div');
                row.className = 'day-row';
                const label = document.createElement('div');
                label.className = 'day-label';
                label.textContent = day;

                const select = document.createElement('select');
                select.innerHTML = `<option value="">-- Select a Meal --</option>`;
                meals.forEach(meal => {
                    const selected = plannedMeals[day] === meal.name ? 'selected' : '';
                    select.innerHTML += `<option value="${meal.name}" ${selected}>${meal.name}</option>`;
                });

                select.addEventListener('change', async (e) => {
                    plannedMeals[day] = e.target.value;
                    updateShoppingList();
                    await saveData();
                });

                row.appendChild(label);
                row.appendChild(select);
                calendarDiv.appendChild(row);
            });
        }

        function renderMealLibrary() {
            const libraryDiv = document.getElementById('meal-library');
            libraryDiv.innerHTML = '';
            meals.forEach(meal => {
                const card = document.createElement('div');
                card.className = 'meal-card';
                const totalProtein = meal.ingredients.reduce((sum, ing) => sum + (Number(ing.protein) || 0), 0).toFixed(1);
                
                let ingredientsHtml = meal.ingredients.map(ing => 
                    `<li class="muted" style="padding: 0.2rem 0;">
                        <span>${ing.item}</span> <span>(${ing.qty} ${ing.unit})</span>
                    </li>`
                ).join('');

                card.innerHTML = `
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: baseline;">
                            <h3 style="margin-bottom: 0.25rem;">${meal.name}</h3>
                            <span style="font-size: 0.85em; background: var(--accent-bg); padding: 2px 6px; border-radius: 4px;">Yields: ${meal.servings || 1}</span>
                        </div>
                        <p style="font-size: 0.9em; margin-top: 0; font-weight: bold; color: #444;">Total Protein: ${totalProtein}g</p>
                        <ul style="border-top: 1px solid var(--accent-bg); padding-top: 0.5rem;">
                            ${ingredientsHtml}
                        </ul>
                    </div>
                    <div class="btn-group">
                        <button class="btn-secondary" onclick="editMeal('${meal.name}')" style="padding: 0.5rem;">Edit</button>
                        <button class="btn-danger" onclick="deleteMeal('${meal.name}')" style="padding: 0.5rem;">Delete</button>
                    </div>
                `;
                libraryDiv.appendChild(card);
            });
        }

        // ==========================================
        // CORE LOGIC: PRICING & ZERO-WASTE SUGGESTIONS
        // ==========================================
        function updateShoppingList() {
            const listDiv = document.getElementById('shopping-list');
            listDiv.innerHTML = '';

            const ingredientTotals = {}; 
            let activePlannedMeals = Object.values(plannedMeals).filter(Boolean);

            if (activePlannedMeals.length === 0) {
                listDiv.innerHTML = '<li>No meals planned yet.</li>';
                document.getElementById('grand-total').textContent = '$0.00';
                document.getElementById('smart-suggestions-box').style.display = 'none';
                return;
            }

            // 1. Calculate required recipe base units needed
            activePlannedMeals.forEach(mealName => {
                const meal = meals.find(m => m.name === mealName);
                if (!meal) return;
                
                meal.ingredients.forEach(ing => {
                    const normalizedName = ing.item.toLowerCase().trim();
                    const unit = (ing.unit || "").toLowerCase().trim();
                    const multiplier = unitMultipliers[unit] || 1;
                    const qtyInBaseUnits = Number(ing.qty) * multiplier;

                    if (ingredientTotals[normalizedName]) {
                        ingredientTotals[normalizedName] += qtyInBaseUnits;
                    } else {
                        ingredientTotals[normalizedName] = qtyInBaseUnits;
                    }
                });
            });

            let grandTotal = 0;
            const surplusTracker = {};

            // 2. Cross-reference with Trader Joe's database and generate UI list items
            Object.keys(ingredientTotals).sort().forEach(name => {
                const totalNeeded = ingredientTotals[name];
                const tjData = traderJoesDB[name];
                
                let lineItemHtml = '';
                
                if (tjData) {
                    const packagesNeeded = Math.ceil(totalNeeded / tjData.pkgSize);
                    const itemCost = packagesNeeded * tjData.price;
                    grandTotal += itemCost;
                    
                    const totalVolumeBought = packagesNeeded * tjData.pkgSize;
                    const leftoverVolume = totalVolumeBought - totalNeeded;
                    surplusTracker[name] = { surplus: leftoverVolume, baseUnit: tjData.baseUnit };

                    lineItemHtml = `
                        <li>
                            <div>
                                <strong>${tjData.label}</strong><br>
                                <span class="muted">Need: ${totalNeeded.toFixed(1)} ${tjData.baseUnit} | Buying: ${packagesNeeded} pkg(s)</span>
                            </div>
                            <span style="font-family: var(--font-serif); font-weight: bold;">$${itemCost.toFixed(2)}</span>
                        </li>`;
                } else {
                    // Fallback for missing custom items
                    lineItemHtml = `
                        <li>
                            <div><strong>${name.charAt(0).toUpperCase() + name.slice(1)}</strong></div>
                            <span class="muted">${totalNeeded.toFixed(1)} unit(s)</span>
                        </li>`;
                }
                listDiv.innerHTML += lineItemHtml;
            });

            document.getElementById('grand-total').textContent = `$${grandTotal.toFixed(2)}`;
            generateSmartSuggestions(surplusTracker, ingredientTotals);
        }

        function generateSmartSuggestions(surplusTracker, ingredientTotals) {
            const suggestionsDiv = document.getElementById('suggestions-content');
            suggestionsDiv.innerHTML = '';
            let foundSuggestions = false;

            const activePlannedMeals = Object.values(plannedMeals).filter(Boolean);
            const unplannedMeals = meals.filter(m => !activePlannedMeals.includes(m.name));

            // Strategy A: Leftover Optimization (Zero Waste)
            unplannedMeals.forEach(meal => {
                let usesSurplus = false;
                let details = [];

                meal.ingredients.forEach(ing => {
                    const normalizedName = ing.item.toLowerCase().trim();
                    const multiplier = unitMultipliers[ing.unit.toLowerCase().trim()] || 1;
                    const neededBase = ing.qty * multiplier;

                    if (surplusTracker[normalizedName] && surplusTracker[normalizedName].surplus >= neededBase) {
                        usesSurplus = true;
                        details.push(`${ing.item} (${surplusTracker[normalizedName].surplus.toFixed(1)} ${surplusTracker[normalizedName].baseUnit} left over)`);
                    }
                });

                if (usesSurplus && details.length > 0) {
                    foundSuggestions = true;
                    suggestionsDiv.innerHTML += `
                        <div class="suggestion-item">
                            ♻️ <strong>Zero-Waste Alert:</strong> You have enough extra package surplus to build a <strong>${meal.name}</strong> without buying extra packages of: <em>${details.join(', ')}</em>!
                        </div>`;
                }
            });

            // Strategy B: Upsell Nudge ("Add 1 item for $X")
            unplannedMeals.forEach(meal => {
                let missingItemsCost = 0;
                let missingItemsCount = 0;
                let missingLabels = [];

                meal.ingredients.forEach(ing => {
                    const normalizedName = ing.item.toLowerCase().trim();
                    const multiplier = unitMultipliers[ing.unit.toLowerCase().trim()] || 1;
                    const neededBase = ing.qty * multiplier;

                    const totalInCart = ingredientTotals[normalizedName] || 0;
                    const currentSurplus = surplusTracker[normalizedName] ? surplusTracker[normalizedName].surplus : 0;

                    if (totalInCart === 0 || currentSurplus < neededBase) {
                        const tjData = traderJoesDB[normalizedName];
                        if (tjData) {
                            missingItemsCost += tjData.price;
                            missingItemsCount++;
                            missingLabels.push(tjData.label);
                        }
                    }
                });

                if (missingItemsCount > 0 && missingItemsCount <= 2 && missingItemsCost <= 6.00) {
                    foundSuggestions = true;
                    suggestionsDiv.innerHTML += `
                        <div class="suggestion-item">
                            💡 <strong>Smart Upgrade:</strong> Add just <strong>${missingLabels.join(' and ')}</strong> for an extra <strong>$${missingItemsCost.toFixed(2)}</strong> to cook a brand new <strong>${meal.name}</strong>!
                        </div>`;
                }
            });

            document.getElementById('smart-suggestions-box').style.display = foundSuggestions ? 'block' : 'none';
        }

        // ==========================================
        // SMART PROTEIN CALCULATION
        // ==========================================
        function calculateProtein(name, qty, unit) {
            name = name.toLowerCase().trim();
            unit = unit.toLowerCase().trim();
            const foodItem = nutritionDB.find(dbItem => dbItem.keywords.some(keyword => name.includes(keyword)));
            if (!foodItem) return null;

            const multiplier = unitMultipliers[unit] || 1; 
            if (unit === "whole" || unit === "") {
                return (foodItem.proteinPerOz * qty).toFixed(1);
            }
            return (qty * multiplier * foodItem.proteinPerOz).toFixed(1);
        }

        // ==========================================
        // FORM & CRUD INTERACTIONS
        // ==========================================
        document.getElementById('ingredient-inputs').addEventListener('input', (e) => {
            const tList = e.target.classList;
            if (tList.contains('ing-name') || tList.contains('ing-qty') || tList.contains('ing-unit')) {
                const row = e.target.closest('.ingredient-row');
                const nameInput = row.querySelector('.ing-name').value;
                const qtyInput = parseFloat(row.querySelector('.ing-qty').value) || 0;
                const unitInput = row.querySelector('.ing-unit').value;
                const proteinInput = row.querySelector('.ing-protein');
                
                if (nameInput && qtyInput > 0) {
                    const calculatedProtein = calculateProtein(nameInput, qtyInput, unitInput);
                    if (calculatedProtein !== null) {
                        proteinInput.value = calculatedProtein;
                        proteinInput.style.backgroundColor = "#e8f5e9";
                        setTimeout(() => proteinInput.style.backgroundColor = "", 1000);
                    }
                }
            }
        });

        document.getElementById('add-ingredient-btn').addEventListener('click', () => {
            const container = document.getElementById('ingredient-inputs');
            const row = document.createElement('div');
            row.className = 'ingredient-row';
            row.innerHTML = `
                <input type="text" class="ing-name" placeholder="Ingredient" required>
                <input type="number" step="0.1" class="ing-qty" placeholder="Qty" required>
                <input type="text" class="ing-unit" placeholder="Unit (e.g., lbs, cups)" required>
                <input type="number" step="0.1" class="ing-protein" placeholder="Protein (g)" required>
            `;
            container.appendChild(row);
        });

        window.deleteMeal = async function(mealName) {
            if(confirm(`Are you sure you want to delete ${mealName}?`)) {
                meals = meals.filter(m => m.name !== mealName);
                for (const day in plannedMeals) {
                    if (plannedMeals[day] === mealName) plannedMeals[day] = "";
                }
                await saveData();
                renderCalendar();
                renderMealLibrary();
                updateShoppingList();
            }
        };

        window.editMeal = function(mealName) {
            const meal = meals.find(m => m.name === mealName);
            if(!meal) return;
            
            isEditing = true;
            editingMealName = mealName;
            
            document.getElementById('form-title').textContent = `Edit Meal: ${mealName}`;
            document.getElementById('new-meal-name').value = meal.name;
            document.getElementById('new-meal-servings').value = meal.servings || 1;
            document.getElementById('submit-meal-btn').textContent = "Update Meal";
            document.getElementById('cancel-edit-btn').style.display = "block";
            
            const container = document.getElementById('ingredient-inputs');
            container.innerHTML = ''; 
            
            meal.ingredients.forEach(ing => {
                const row = document.createElement('div');
                row.className = 'ingredient-row';
                row.innerHTML = `
                    <input type="text" class="ing-name" placeholder="Ingredient" value="${ing.item}" required>
                    <input type="number" step="0.1" class="ing-qty" placeholder="Qty" value="${ing.qty}" required>
                    <input type="text" class="ing-unit" placeholder="Unit (e.g., lbs, cups)" value="${ing.unit || ''}" required>
                    <input type="number" step="0.1" class="ing-protein" placeholder="Protein (g)" value="${ing.protein}" required>
                `;
                container.appendChild(row);
            });
            window.scrollTo({ top: document.getElementById('create-meal-form').offsetTop - 50, behavior: 'smooth' });
        };

        window.cancelEdit = function() {
            isEditing = false;
            editingMealName = null;
            document.getElementById('form-title').textContent = "Create Custom Meal";
            document.getElementById('submit-meal-btn').textContent = "Save Meal";
            document.getElementById('cancel-edit-btn').style.display = "none";
            document.getElementById('create-meal-form').reset();
            
            document.getElementById('ingredient-inputs').innerHTML = `
                <div class="ingredient-row">
                    <input type="text" class="ing-name" placeholder="Ingredient" required>
                    <input type="number" step="0.1" class="ing-qty" placeholder="Qty" required>
                    <input type="text" class="ing-unit" placeholder="Unit (e.g., lbs, cups)" required>
                    <input type="number" step="0.1" class="ing-protein" placeholder="Protein (g)" required>
                </div>
            `;
        };

        document.getElementById('create-meal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('new-meal-name').value;
            const servings = parseInt(document.getElementById('new-meal-servings').value) || 1;
            const ingredientRows = document.querySelectorAll('.ingredient-row');
            
            const newIngredients = [];
            ingredientRows.forEach(row => {
                newIngredients.push({
                    item: row.querySelector('.ing-name').value,
                    qty: parseFloat(row.querySelector('.ing-qty').value),
                    unit: row.querySelector('.ing-unit').value,
                    protein: parseFloat(row.querySelector('.ing-protein').value)
                });
            });

            const newMeal = { name: name, servings: servings, ingredients: newIngredients };
            
            if (isEditing) {
                const index = meals.findIndex(m => m.name === editingMealName);
                if (index !== -1) meals[index] = newMeal;
                if (name !== editingMealName) {
                    for (const day in plannedMeals) {
                        if (plannedMeals[day] === editingMealName) plannedMeals[day] = name;
                    }
                }
            } else {
                meals.push(newMeal);
            }
            
            await saveData();
            cancelEdit(); 
            renderCalendar();
            renderMealLibrary();
            updateShoppingList();
        });

        // Initialize 2.0 Engine
        init();
    </script>
</body>
</html>
