<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planning Dashboard</title>
    <style>
        /* Anthropic-inspired Theme */
        :root {
            --bg-color: #FAF9F6;
            --text-color: #1F1F1E;
            --border-color: #D3CFC2;
            --accent-bg: #EAE8DF;
            --btn-bg: #1F1F1E;
            --btn-text: #FAF9F6;
            --font-serif: 'Georgia', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --success: #2e7d32;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
        }

        #sync-status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: var(--success);
            background: var(--accent-bg);
            padding: 4px 8px;
            border-radius: 12px;
            display: none;
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
            font-weight: normal;
            margin-top: 0;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: 1 / -1;
            }
        }

        .section {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 4px;
            position: relative;
        }

        .section-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
