<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planning Dashboard</title>
    <style>
        :root { --bg-color: #FAF9F6; --text-color: #1F1F1E; --border-color: #D3CFC2; --accent-bg: #EAE8DF; --btn-bg: #1F1F1E; --btn-text: #FAF9F6; --success: #2e7d32; --error: #c62828; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 20px; }
        #sync-status { padding: 10px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; display: none; }
        /* Include the rest of your CSS from the previous version here */
    </style>
</head>
<body>
    <div id="sync-status"></div>
    <h1>Meal Planner</h1>
    
    <script>
        const BIN_ID = "6a34ae6bf5f4af5e290c7fbb"; 
        // Using your Master Key
        const MASTER_KEY = "$2a$10$f2TkUBvxPmf1nty6gYbGy.ww8tUG5Ox/YS8rvFI5bW6pqjuBdj4gW"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        async function saveToCloud() {
            try {
                showSync("↻ Saving...");
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'X-Master-Key': MASTER_KEY 
                    },
                    body: JSON.stringify(cloudData)
                });
                if (!response.ok) throw new Error("Status: " + response.status);
                showSync("☁️ Saved to Cloud");
            } catch (error) {
                console.error(error);
                showSync("⚠️ Save Failed: " + error.message, true);
            }
        }
        
        async function fetchFromCloud() {
            try {
                showSync("↻ Syncing...");
                const response = await fetch(API_URL, { 
                    headers: { 'X-Master-Key': MASTER_KEY } 
                });
                const result = await response.json();
                cloudData = result.record;
                renderAll();
                showSync("☁️ Cloud Synced");
            } catch (error) {
                showSync("⚠️ Offline Mode", true);
            }
        }
        
        function showSync(msg, isError = false) {
            const status = document.getElementById('sync-status');
            status.textContent = msg;
            status.style.display = 'block';
            status.style.backgroundColor = isError ? '#feebee' : '#e8f5e9';
            status.style.color = isError ? 'var(--error)' : 'var(--success)';
        }
        
        // ... (Keep the rest of your JS functions from the previous code block)
    </script>
</body>
</html>
